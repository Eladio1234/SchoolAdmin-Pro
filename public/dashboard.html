<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – SchoolAdmin Pro</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="dashboard-page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">SchoolAdmin <span>Pro</span></h1>
    </div>
    <div class="header-right">
      <span id="usuario-email" class="usuario-email"></span>
      <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <!-- NOTIFICACIÓN -->
  <div id="notificacion" class="notificacion" style="display:none;"></div>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TABS -->
    <nav class="tabs">
      <button class="tab-btn activo" data-tab="tab-alumnos">Alumnos</button>
      <button class="tab-btn" data-tab="tab-docentes">Docentes</button>
    </nav>

    <!-- ═══════════ TAB ALUMNOS ═══════════ -->
    <section id="tab-alumnos" class="tab-panel activo">
      <h2 class="seccion-titulo">Gestión de Alumnos</h2>

      <form id="form-alumno" class="form-crud">
        <h3 class="form-titulo">Nuevo Alumno</h3>
        <div class="form-grid">
          <div class="campo">
            <label>No. Estudiante *</label>
            <input type="text" name="studentNumber" placeholder="Ej. A2024001" />
          </div>
          <div class="campo">
            <label>Nombre completo *</label>
            <input type="text" name="fullName" placeholder="Nombre(s) y Apellidos" />
          </div>
          <div class="campo">
            <label>Email *</label>
            <input type="email" name="email" placeholder="alumno@escuela.edu" />
          </div>
          <div class="campo">
            <label>Teléfono * (10 dígitos)</label>
            <input type="tel" name="phone" placeholder="5512345678" maxlength="10" />
          </div>
          <div class="campo">
            <label>Carrera *</label>
            <input type="text" name="career" placeholder="Ej. Ingeniería en Sistemas" />
          </div>
          <div class="campo">
            <label>Semestre *</label>
            <input type="number" name="semester" placeholder="Ej. 4" min="1" max="12" />
          </div>
          <div class="campo">
            <label>Estado *</label>
            <select name="status">
              <option value="">-- Seleccionar --</option>
              <option value="active">Activo</option>
              <option value="inactive">Inactivo</option>
              <option value="graduated">Graduado</option>
              <option value="dropped">Baja</option>
            </select>
          </div>
        </div>
        <div class="form-acciones">
          <button type="submit" id="submit-alumno" class="btn-primary">Agregar Alumno</button>
          <button type="button" id="btn-cancelar-alumno" class="btn-secondary" style="display:none;">Cancelar</button>
        </div>
      </form>

      <div class="tabla-wrapper">
        <table id="tabla-alumnos">
          <thead>
            <tr>
              <th>No. Estudiante</th>
              <th>Nombre completo</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Carrera / Semestre</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="7" class="sin-datos">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ═══════════ TAB DOCENTES ═══════════ -->
    <section id="tab-docentes" class="tab-panel">
      <h2 class="seccion-titulo">Gestión de Docentes</h2>

      <form id="form-docente" class="form-crud">
        <h3 class="form-titulo">Nuevo Docente</h3>
        <div class="form-grid">
          <div class="campo">
            <label>No. Empleado *</label>
            <input type="text" name="employeeNumber" placeholder="Ej. EMP001" />
          </div>
          <div class="campo">
            <label>Nombre completo *</label>
            <input type="text" name="fullName" placeholder="Nombre(s) y Apellidos" />
          </div>
          <div class="campo">
            <label>Email *</label>
            <input type="email" name="email" placeholder="docente@escuela.edu" />
          </div>
          <div class="campo">
            <label>Teléfono * (10 dígitos)</label>
            <input type="tel" name="phone" placeholder="5512345678" maxlength="10" />
          </div>
          <div class="campo">
            <label>Especialidad *</label>
            <input type="text" name="specialty" placeholder="Ej. Ingeniería de Software" />
          </div>
          <div class="campo">
            <label>Estado *</label>
            <select name="active">
              <option value="">-- Seleccionar --</option>
              <option value="true">Activo</option>
              <option value="false">Inactivo</option>
            </select>
          </div>
        </div>
        <div class="form-acciones">
          <button type="submit" id="submit-docente" class="btn-primary">Agregar Docente</button>
          <button type="button" id="btn-cancelar-docente" class="btn-secondary" style="display:none;">Cancelar</button>
        </div>
      </form>

      <div class="tabla-wrapper">
        <table id="tabla-docentes">
          <thead>
            <tr>
              <th>No. Empleado</th>
              <th>Nombre completo</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Especialidad</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="7" class="sin-datos">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
