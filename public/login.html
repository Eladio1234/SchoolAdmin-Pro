<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SchoolAdmin Pro</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

    <div class="login-container">
        <h1>SchoolAdmin Pro</h1>
        <form id="loginform">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ej@school.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="loginbtn">Entrar al Sistema</button>
            <p id="errormsg" class="error-message">Credenciales incorrectas.</p>
        </form>
    </div>

    <script type="module" src="./js/login.js"></script>

</body>
</html>
