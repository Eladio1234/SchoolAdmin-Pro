<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - SchoolAdmin Pro</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1 class="auth-logo">SchoolAdmin <span>Pro</span></h1>
    <h2>Iniciar Sesión</h2>

    <div id="notificacion" class="notificacion oculto"></div>

    <form id="form-login">
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" id="loginbtn" class="btn-primary btn-block">Entrar</button>
    </form>
  </div>

  <script type="module" src="./js/ui.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
