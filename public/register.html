<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro – SchoolAdmin Pro</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1 class="auth-logo">SchoolAdmin <span>Pro</span></h1>
    <h2>Crear Cuenta Admin</h2>

    <div id="notificacion" class="notificacion oculto"></div>

    <form id="form-register">
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>
      <div class="campo">
        <label for="password2">Confirmar contraseña</label>
        <input type="password" id="password2" name="password2" placeholder="Repite la contraseña" required />
      </div>
      <button type="submit" class="btn-primary btn-block">Crear cuenta</button>
    </form>

    <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>

  <script type="module">
    import { registerUser, observeAuth } from './js/auth.js';
    import { mostrarNotificacion } from './js/ui.js';

    observeAuth(usuario => {
      if (usuario) window.location.href = 'dashboard-admin.html';
    });

    document.getElementById('form-register').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        mostrarNotificacion('Las contraseñas no coinciden', 'error');
        return;
      }
      try {
        await registerUser(email, password);
        window.location.href = 'dashboard-admin.html';
      } catch (err) {
        const msg = err.code === 'auth/email-already-in-use'
          ? 'Este correo ya está registrado'
          : err.message;
        mostrarNotificacion(msg, 'error');
      }
    });
  </script>
</body>
</html>
